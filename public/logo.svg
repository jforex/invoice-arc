<svg width="44" height="52" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Back layer: the scroll body shadow -->
  <rect x="8" y="10" width="28" height="34" rx="1" fill="#2A1C10"/>
  
  <!-- Main parchment surface -->
  <rect x="7" y="9" width="28" height="34" rx="1" fill="#3D2817"/>
  
  <!-- Top curl: rolled cylinder -->
  <g>
    <ellipse cx="21" cy="9" rx="15" ry="4.5" fill="#4D3422"/>
    <ellipse cx="21" cy="9" rx="15" ry="4.5" fill="none" stroke="#2A1C10" stroke-width="0.6"/>
    <ellipse cx="21" cy="7.5" rx="12" ry="1.8" fill="#5D4226" opacity="0.7"/>
    <!-- end cap on right -->
    <ellipse cx="36" cy="9" rx="2" ry="4.5" fill="#3D2817" opacity="0.5"/>
    <ellipse cx="6" cy="9" rx="2" ry="4.5" fill="#3D2817" opacity="0.5"/>
  </g>
  
  <!-- Writing lines on parchment -->
  <line x1="12" y1="19" x2="30" y2="19" stroke="#E8D5B7" stroke-width="1.7" stroke-linecap="round" stroke-opacity="0.92"/>
  <line x1="12" y1="25" x2="26" y2="25" stroke="#E8D5B7" stroke-width="1.7" stroke-linecap="round" stroke-opacity="0.78"/>
  <line x1="12" y1="31" x2="30" y2="31" stroke="#E8D5B7" stroke-width="1.7" stroke-linecap="round" stroke-opacity="0.92"/>
  <line x1="12" y1="37" x2="23" y2="37" stroke="#E8D5B7" stroke-width="1.7" stroke-linecap="round" stroke-opacity="0.7"/>
  
  <!-- Bottom curl: rolled cylinder -->
  <g>
    <ellipse cx="21" cy="43" rx="15" ry="4.5" fill="#2A1C10"/>
    <ellipse cx="21" cy="43" rx="15" ry="4.5" fill="none" stroke="#1A1108" stroke-width="0.6"/>
    <ellipse cx="21" cy="41.5" rx="12" ry="1.5" fill="#3D2817" opacity="0.6"/>
    <ellipse cx="36" cy="43" rx="2" ry="4.5" fill="#1A1108" opacity="0.6"/>
    <ellipse cx="6" cy="43" rx="2" ry="4.5" fill="#1A1108" opacity="0.6"/>
  </g>
</svg>
